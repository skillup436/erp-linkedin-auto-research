name: Refine Content Strategy

on:
  schedule:
    # Run on the 1st of every month at 11 AM UTC
    - cron: '0 11 1 * *'
  workflow_dispatch:

jobs:
  refine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Refine strategy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_INSIGHTS_DB_ID: ${{ secrets.NOTION_INSIGHTS_DB_ID }}
          NOTION_STRATEGY_VERSIONS_DB_ID: ${{ secrets.NOTION_STRATEGY_VERSIONS_DB_ID }}
        run: |
          python scripts/update_strategy.py
      
      - name: Commit updated strategy
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/content_strategy.md
          git commit -m "Auto-update content strategy based on performance data" || echo "No changes to commit"
          git push
