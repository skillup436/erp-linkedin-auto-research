name: Refine Content Strategy
on:
  schedule:
    # Run on the 1st of every month at 11 AM Riyadh time (UTC+3 = 8 AM UTC)
    - cron: '0 8 1 * *'
  workflow_dispatch:
jobs:
  refine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Refine strategy
      id: refine
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_INSIGHTS_DB_ID: ${{ secrets.NOTION_INSIGHTS_DB_ID }}
        NOTION_STRATEGY_VERSIONS_DB_ID: ${{ secrets.NOTION_STRATEGY_VERSIONS_DB_ID }}
      run: |
        python scripts/update_strategy.py

    - name: Commit updated strategy
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add content/content_strategy.md
        git commit -m "Auto-update content strategy based on performance data" || echo "No changes to commit"
        git push

    - name: Notify on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_APP_PASSWORD }}
        subject: "[ALERT] ERP LinkedIn - Strategy Refinement FAILED (#${{ github.run_number }})"
        to: draissam@gmail.com
        from: LinkedIn Auto-Research <${{ secrets.GMAIL_USERNAME }}>
        body: |
          The monthly content strategy refinement workflow has FAILED.

          Workflow: Refine Content Strategy
          Run #: ${{ github.run_number }}
          Triggered at: ${{ github.event.repository.updated_at }}

          Common causes:
          - Claude API credit exhausted (check https://console.anthropic.com)
          - Notion token expired or rate limited
          - No performance data available to analyze
          - Git push permission error

          View the full error log here:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate and rerun manually once resolved.
