name: Analyze LinkedIn Performance

on:
  schedule:
    # Run every Sunday at 10 AM UTC
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Analyze performance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_INSIGHTS_DB_ID: ${{ secrets.NOTION_INSIGHTS_DB_ID }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          LINKEDIN_PROFILE_EN: ${{ secrets.LINKEDIN_PROFILE_EN }}
          LINKEDIN_PROFILE_FR: ${{ secrets.LINKEDIN_PROFILE_FR }}
        run: |
          python scripts/analyze_performance.py
