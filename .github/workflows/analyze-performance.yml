name: Analyze LinkedIn Performance
on:
  schedule:
    # Run every Sunday at 10 AM Riyadh time (UTC+3 = 7 AM UTC)
    - cron: '0 7 * * 0'
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Analyze performance
      id: analyze
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_INSIGHTS_DB_ID: ${{ secrets.NOTION_INSIGHTS_DB_ID }}
        APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        LINKEDIN_PROFILE_EN: ${{ secrets.LINKEDIN_PROFILE_EN }}
        LINKEDIN_PROFILE_FR: ${{ secrets.LINKEDIN_PROFILE_FR }}
      run: |
        python scripts/analyze_performance.py

    - name: Notify on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_APP_PASSWORD }}
        subject: "[ALERT] ERP LinkedIn - Performance Analysis FAILED (#${{ github.run_number }})"
        to: draissam@gmail.com
        from: LinkedIn Auto-Research <${{ secrets.GMAIL_USERNAME }}>
        body: |
          The weekly LinkedIn performance analysis workflow has FAILED.

          Workflow: Analyze LinkedIn Performance
          Run #: ${{ github.run_number }}
          Triggered at: ${{ github.event.repository.updated_at }}

          Common causes:
          - Apify API credit exhausted (check https://console.apify.com/billing)
          - Claude API credit exhausted (check https://console.anthropic.com)
          - Notion token expired or rate limited
          - LinkedIn scraper actor unavailable

          View the full error log here:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate and rerun manually once resolved.
